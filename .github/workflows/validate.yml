name: Validate submissions
on:
  pull_request:
    paths: ["apps/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Enforce immutability/collision over changed paths
        working-directory: tools
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          npx tsx src/cli/check-changeset.ts "origin/${{ github.base_ref }}"
      - name: Validate all releases
        working-directory: tools
        run: npx tsx src/cli/validate.ts ../apps
      - name: Validate screenshots on new releases
        working-directory: tools
        run: npx tsx src/cli/validate-screenshots.ts "origin/${{ github.base_ref }}"
