name: Publish app assets
# Publishes each app's package.tar.gz as a GitHub Release asset (one release per
# app, tag = appId, asset = <appId>-<version>.tar.gz) so GitHub counts each
# download. The daily Fetch downloads job reads those counts back into the
# build. Idempotent: existing assets are never re-uploaded (that would reset
# their download counts), so only newly added versions are published. Runs on
# the protected branch when apps change, or maintainer-triggered.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "extensions/**"

permissions:
  contents: write

concurrency:
  group: publish-app-assets
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          # App tarballs are Git LFS objects; gh uploads the resolved files.
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Publish app release assets
        working-directory: tools
        # GH_TOKEN authenticates the gh CLI used to create releases and upload assets.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/cli/publish-assets.ts --apps ../apps --extensions ../extensions
