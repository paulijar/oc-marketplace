name: Ingest screenshots
# Downloads, re-validates, and commits app screenshots into the repo so they are
# served same-origin (the ownCloud market client's image CSP blocks arbitrary
# external origins). Runs on the protected branch — maintainer-triggered, or on
# a publish push — never on PRs (fork PRs cannot be granted write access).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    # Only new release packages can introduce new screenshots. The ingestion
    # commit writes under screenshots/, which is excluded here, so it does not
    # re-trigger this workflow.
    paths: ["apps/**/releases/**/package.tar.gz"]

permissions:
  contents: write

concurrency:
  group: ingest-screenshots
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      # Mint a token for the marketplace-bot GitHub App. The App is a bypass
      # actor on the org-wide `owncloud-default-branch-policy` ruleset (managed in
      # owncloud/admin), so its direct push to the protected `main` is exempt from
      # BOTH the pull-request and signed-commit rules. The built-in GITHUB_TOKEN /
      # github-actions[bot] is NOT an eligible bypass actor, which is why this App
      # identity is required.
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MARKETPLACE_BOT_APP_ID }}
          private-key: ${{ secrets.MARKETPLACE_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          lfs: true
          fetch-depth: 0
          # Persist the App token so the `git push` below authenticates as the
          # marketplace-bot App (the ruleset bypass actor), not the default token.
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Download, validate, and write screenshots
        working-directory: tools
        run: npx tsx src/cli/ingest-screenshots.ts --apps ../apps
      - name: Commit ingested screenshots
        run: |
          # Author the commit as the marketplace-bot App itself (the identity
          # that pushes and bypasses the ruleset). The email is GitHub's
          # canonical App-bot no-reply form, <user-id>+<slug>[bot]@…, which makes
          # GitHub attribute the commit to the App. (Previously hardcoded to
          # `owncloud-bot` / a stray `bot@users.noreply.github.com`, which
          # mis-attributed these commits to an unrelated user.)
          git config user.name "owncloud-marketplace-bot[bot]"
          git config user.email "299143275+owncloud-marketplace-bot[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps)" ]; then
            git add apps
            git commit -m "chore: ingest validated app screenshots"
            git push origin main
          else
            echo "No new screenshots to ingest."
          fi
