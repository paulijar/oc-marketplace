name: Build and deploy
on:
  push:
    branches: [main]
  # Manual kick-off of a page regeneration.
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin to main: on workflow_dispatch the default checkout already
          # resolves to the main tip, but being explicit guarantees we build the
          # data commit the triggering push just landed.
          ref: main
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      # Derive the published origin/base path from the running repo, so URLs are
      # correct in any account or org without hardcoding a host.
      - id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install deps
        run: |
          (cd tools && npm ci)
          (cd website && npm ci)
      # Ingest screenshots to disk before generating the API so a freshly
      # published release has its screenshots on the FIRST deploy — without this,
      # generate-api runs before ingest-screenshots.yml's commit lands and emits
      # an empty screenshots array. Idempotent and best-effort: already-ingested
      # releases are skipped and a dead URL never fails the build. Committing the
      # files back into the repo stays the job of ingest-screenshots.yml.
      - name: Ingest screenshots
        run: cd tools && npx tsx src/cli/ingest-screenshots.ts --apps ../apps
      # Point at all committed release data: --downloads (live counts, refreshed
      # by fetch-downloads.yml), --downloads-baseline (historical totals for
      # imported releases) and --created (real historical release dates). Without
      # --created/--downloads-baseline the defaults resolve to tools/data/* (cwd
      # is tools/), which don't exist, so imported releases would silently fall
      # back to their git-commit date and lose their baseline download counts.
      - name: Generate static API (re-validates all apps)
        env:
          MARKETPLACE_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: cd tools && npx tsx src/cli/generate-api.ts --apps ../apps --extensions ../extensions --publishers ../publishers --out ../_site --downloads ../data/downloads.json --downloads-baseline ../data/downloads-baseline.json --created ../data/created.json
      - name: Build website
        env:
          MARKETPLACE_SITE_URL: ${{ steps.pages.outputs.origin }}
          MARKETPLACE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Gates the still-beta Linux package-manager section. Unset on the live
          # repo (→ hidden); the staging fork sets the SHOW_LINUX_REPOS repo
          # variable to "true" to reveal it. Same workflow file in both repos.
          MARKETPLACE_SHOW_LINUX_REPOS: ${{ vars.SHOW_LINUX_REPOS }}
        run: cd website && npm run build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
