name: Build and deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      # Derive the published origin/base path from the running repo, so URLs are
      # correct in any account or org without hardcoding a host.
      - id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Install deps
        run: |
          (cd tools && npm ci)
          (cd website && npm ci)
      # Ingest screenshots to disk before generating the API so a freshly
      # published release has its screenshots on the FIRST deploy — without this,
      # generate-api runs before ingest-screenshots.yml's commit lands and emits
      # an empty screenshots array. Idempotent and best-effort: already-ingested
      # releases are skipped and a dead URL never fails the build. Committing the
      # files back into the repo stays the job of ingest-screenshots.yml.
      - name: Ingest screenshots
        run: cd tools && npx tsx src/cli/ingest-screenshots.ts --apps ../apps
      - name: Generate static API (re-validates all apps)
        env:
          MARKETPLACE_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: cd tools && npx tsx src/cli/generate-api.ts --apps ../apps --out ../_site
      - name: Build website
        env:
          MARKETPLACE_SITE_URL: ${{ steps.pages.outputs.origin }}
          MARKETPLACE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: cd website && npm run build
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
