name: Tools CI
on:
  pull_request:
    paths: ["tools/**", "website/**", ".github/workflows/**"]
  push:
    branches: [main]
    paths: ["tools/**", "website/**", ".github/workflows/**"]

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install
        run: |
          (cd tools && npm ci)
          (cd website && npm ci)
      - name: Lint
        run: cd tools && npm run lint
      - name: Format check
        run: cd tools && npm run format:check
      - name: Typecheck
        run: cd tools && npm run typecheck
      - name: Test
        run: cd tools && npm test
      - name: Website build smoke test
        run: |
          cd tools && npx tsx src/cli/generate-api.ts --apps ../apps --extensions ../extensions --out ../_site
          cd ../website && npm run build
      - name: Verify build output
        run: |
          test -s _site/index.html
          test -d _site/api/v1
          grep -q "Marketplace" _site/index.html || { echo "index.html looks empty/broken"; exit 1; }

  # Exercise the GitHub Pages actions (configure-pages, upload-pages-artifact)
  # at PR time using the same SHA pins as deploy.yml, so Dependabot bumps to
  # those actions are validated before merge. Stops short of actions/deploy-pages
  # — that needs pages:write/id-token and is inherently main-only (see deploy.yml).
  pages-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install deps
        run: |
          (cd tools && npm ci)
          (cd website && npm ci)
      - name: Generate static API (re-validates all apps)
        env:
          MARKETPLACE_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: cd tools && npx tsx src/cli/generate-api.ts --apps ../apps --extensions ../extensions --out ../_site
      - name: Build website
        env:
          MARKETPLACE_SITE_URL: ${{ steps.pages.outputs.origin }}
          MARKETPLACE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: cd website && npm run build
      - name: Verify build output
        run: |
          test -s _site/index.html
          test -d _site/api/v1
          grep -q "Marketplace" _site/index.html || { echo "index.html looks empty/broken"; exit 1; }
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
