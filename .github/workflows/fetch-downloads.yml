name: Fetch downloads
# Fetches the latest releases of Infinite Scale, the desktop client and mobile
# apps from GitHub, plus the classic ownCloud Server (newest 10.15.x/10.16.x
# release on owncloud/core), and commits
# data/downloads.json, which the deploy build normalizes into
# api/v1/downloads.json. Runs on the protected branch — on a daily schedule or
# maintainer-triggered — never on PRs (fork PRs cannot be granted write access).
on:
  workflow_dispatch: {}
  schedule:
    # Daily at 06:17 UTC; offset from the hour to avoid the cron rush.
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: fetch-downloads
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      # Mint a token for the marketplace-bot GitHub App. The App is a bypass
      # actor on the org-wide `owncloud-default-branch-policy` ruleset (managed in
      # owncloud/admin), so its direct push to the protected `main` is exempt from
      # BOTH the pull-request and signed-commit rules. The built-in GITHUB_TOKEN /
      # github-actions[bot] is NOT an eligible bypass actor, which is why this App
      # identity is required.
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MARKETPLACE_BOT_APP_ID }}
          private-key: ${{ secrets.MARKETPLACE_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          # Persist the App token so the `git push` below authenticates as the
          # marketplace-bot App (the ruleset bypass actor), not the default token.
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Fetch release data
        working-directory: tools
        # GITHUB_TOKEN lifts the anonymous rate limit on the GitHub API.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/cli/fetch-downloads.ts --out ../data/downloads.json
      - name: Commit downloads data
        run: |
          # Author the commit as the marketplace-bot App itself (the identity
          # that pushes and bypasses the ruleset). The email is GitHub's
          # canonical App-bot no-reply form, <user-id>+<slug>[bot]@…, which makes
          # GitHub attribute the commit to the App. (Previously hardcoded to
          # `owncloud-bot` / a stray `bot@users.noreply.github.com`, which
          # mis-attributed these commits to an unrelated user.)
          git config user.name "owncloud-marketplace-bot[bot]"
          git config user.email "299143275+owncloud-marketplace-bot[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/downloads.json)" ]; then
            git add data/downloads.json
            git commit -m "chore: refresh downloads data"
            git push origin main
          else
            echo "Downloads data unchanged."
          fi
